services:
  security:
    image: luidigas/security:latest
    container_name: security
    restart: always
    expose:
      - "3001"
    env_file:
      - .env

  bff-negocios:
    image: luidigas/bff-negocios:latest
    container_name: bff-negocios
    restart: always
    expose:
      - "3002"
    environment:
      - PORT=3002
      - SECURITY_API_URL=http://security:3001/api

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
